name: foxapple

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foxapple}
      POSTGRES_USER: ${POSTGRES_USER:-foxapple}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foxapple} -d ${POSTGRES_DB:-foxapple}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-foxapple}:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/${POSTGRES_DB:-foxapple}
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-local-development-secret-change-me}
      PORT: 3000
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      PAYLOAD_SEED_ON_START: ${PAYLOAD_SEED_ON_START:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  media_data:
  certbot_www:
  letsencrypt:
