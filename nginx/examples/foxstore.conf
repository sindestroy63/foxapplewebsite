# ============================================================================
# TEMPLATE — NOT ACTIVE. Not mounted by docker-compose.yml.
#
# HTTP (port 80) bootstrap config for the new domain ФОХСТОР (фохстор.рф).
# This is the config you use BEFORE SSL certificates exist for the new
# domain, to serve the ACME (Let's Encrypt) challenge and to bootstrap
# certbot for xn--n1aagcfji.xn--p1ai / www.xn--n1aagcfji.xn--p1ai.
#
# Canonical domain (do not change): фохстор.рф = xn--n1aagcfji.xn--p1ai
#
# Every additional domain below issues a permanent 301 redirect to
# https://xn--n1aagcfji.xn--p1ai$request_uri (path + query string preserved):
#   - foxapple.ru / www.foxapple.ru
#   - фоксэпл.рф / www.фоксэпл.рф   (punycode: xn--j1achfjp0e.xn--p1ai / www.xn--j1achfjp0e.xn--p1ai)
#   - fohstore.ru / www.fohstore.ru
#
# Activation steps (perform manually, after DNS for фохстор.рф points at
# this server):
#   1. Copy this file into nginx/conf.d/ (e.g. nginx/conf.d/foxstore.conf).
#   2. Reload/start nginx so the ACME challenge location is served.
#   3. Issue certificates for xn--n1aagcfji.xn--p1ai and
#      www.xn--n1aagcfji.xn--p1ai with certbot.
#   4. Once certs exist, switch to nginx/examples/foxstore.ssl.conf (copy it
#      into nginx/conf.d/ instead, or alongside once http->https redirects
#      here are no longer needed).
#   5. Only then remove/retire the old nginx/conf.d/foxapple.conf.
#
# Do NOT copy this into nginx/conf.d/ until DNS for the new domain is live.
# Do NOT run certbot or reload the production nginx container from this
# session — this file is prepared for manual activation only.
# ============================================================================

upstream foxstore_app {
  server app:3000;
}

# --- New domain: ACME challenge + redirect to HTTPS ---
server {
  listen 80;
  server_name xn--n1aagcfji.xn--p1ai www.xn--n1aagcfji.xn--p1ai;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
  }
}

# --- Old domain (foxapple.ru): permanent redirect to the new domain ---
# Preserves path and query string, e.g.:
#   https://foxapple.ru/catalog/iphone?color=black
#   -> https://xn--n1aagcfji.xn--p1ai/catalog/iphone?color=black
server {
  listen 80;
  server_name foxapple.ru www.foxapple.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
  }
}

# --- Old Cyrillic/punycode domain (фоксэпл.рф + www): permanent redirect ---
server {
  listen 80;
  server_name xn--j1achfjp0e.xn--p1ai www.xn--j1achfjp0e.xn--p1ai;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
  }
}

# --- Alternate domain (fohstore.ru): permanent redirect to the new domain ---
# Preserves path and query string, e.g.:
#   https://fohstore.ru/catalog/iphone?color=black
#   -> https://xn--n1aagcfji.xn--p1ai/catalog/iphone?color=black
server {
  listen 80;
  server_name fohstore.ru www.fohstore.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
  }
}
