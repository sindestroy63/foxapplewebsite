upstream foxapple_app {
  server app:3000;
}

server {
  listen 80;
  server_name foxapple.ru www.foxapple.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://foxapple.ru$request_uri;
  }
}

server {
  listen 80;
  server_name xn--j1achfjp0e.xn--p1ai;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://foxapple.ru$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name foxapple.ru www.foxapple.ru;

  ssl_certificate /etc/letsencrypt/live/foxapple.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/foxapple.ru/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://foxapple_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;
  }
}

server {
  listen 443 ssl http2;
  server_name xn--j1achfjp0e.xn--p1ai;

  ssl_certificate /etc/letsencrypt/live/foxapple.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/foxapple.ru/privkey.pem;

  return 301 https://foxapple.ru$request_uri;
}
