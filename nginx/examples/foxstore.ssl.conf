# ============================================================================
# TEMPLATE — NOT ACTIVE. Not mounted by docker-compose.yml.
#
# Full HTTPS config for the new domain ФОХСТОР (фохстор.рф), once SSL
# certificates for xn--n1aagcfji.xn--p1ai (and, if still valid, the old
# foxapple.ru / xn--j1achfjp0e.xn--p1ai / fohstore.ru certs) exist on the
# server.
#
# Canonical domain (do not change): фохстор.рф = xn--n1aagcfji.xn--p1ai
#
# Every additional domain below issues a permanent 301 redirect to
# https://xn--n1aagcfji.xn--p1ai$request_uri (path + query string preserved):
#   - foxapple.ru / www.foxapple.ru
#   - фоксэпл.рф / www.фоксэпл.рф   (punycode: xn--j1achfjp0e.xn--p1ai / www.xn--j1achfjp0e.xn--p1ai)
#   - fohstore.ru / www.fohstore.ru
#
# e.g.: https://foxapple.ru/catalog/iphone?color=black
#       -> https://xn--n1aagcfji.xn--p1ai/catalog/iphone?color=black
#
# Activation steps (perform manually, after DNS + certbot issuance):
#   1. Confirm certificates exist for:
#        /etc/letsencrypt/live/xn--n1aagcfji.xn--p1ai/
#      (and that the existing foxapple.ru / fohstore.ru certs are still
#      valid, if you want the old-domain redirect blocks below to keep
#      serving HTTPS during the transition period).
#   2. Copy this file into nginx/conf.d/ (e.g. nginx/conf.d/foxstore.conf),
#      replacing nginx/examples/foxstore.conf once redirected HTTP bootstrap
#      is no longer needed (ACME challenge locations can stay for renewal).
#   3. Retire nginx/conf.d/foxapple.conf only after confirming the new
#      domain serves correctly end-to-end.
#   4. Reload nginx (this session does not do this — activation is manual).
# ============================================================================

upstream foxstore_app {
  server app:3000;
}

# --- New domain: primary HTTPS server ---
server {
  listen 443 ssl http2;
  server_name xn--n1aagcfji.xn--p1ai;

  ssl_certificate /etc/letsencrypt/live/xn--n1aagcfji.xn--p1ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/xn--n1aagcfji.xn--p1ai/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://foxstore_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;
  }
}

# --- www -> non-www (new domain) ---
server {
  listen 443 ssl http2;
  server_name www.xn--n1aagcfji.xn--p1ai;

  ssl_certificate /etc/letsencrypt/live/xn--n1aagcfji.xn--p1ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/xn--n1aagcfji.xn--p1ai/privkey.pem;

  return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
}

# --- Old domain (foxapple.ru + www): permanent redirect to the new domain ---
# Requires the existing foxapple.ru certificate to remain valid during the
# transition window so HTTPS requests to the old domain can still be served
# (in order to issue the redirect) instead of failing TLS handshake.
server {
  listen 443 ssl http2;
  server_name foxapple.ru www.foxapple.ru;

  ssl_certificate /etc/letsencrypt/live/foxapple.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/foxapple.ru/privkey.pem;

  return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
}

# --- Old Cyrillic/punycode domain (фоксэпл.рф + www): permanent redirect ---
server {
  listen 443 ssl http2;
  server_name xn--j1achfjp0e.xn--p1ai www.xn--j1achfjp0e.xn--p1ai;

  ssl_certificate /etc/letsencrypt/live/foxapple.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/foxapple.ru/privkey.pem;

  return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
}

# --- Alternate domain (fohstore.ru + www): permanent redirect ---
# Requires its own valid certificate (fohstore.ru) to terminate TLS before
# issuing the redirect. If no certificate exists yet for this domain, this
# block will not serve HTTPS correctly until one is obtained — use the HTTP
# bootstrap in nginx/examples/foxstore.conf to issue it via certbot first.
server {
  listen 443 ssl http2;
  server_name fohstore.ru www.fohstore.ru;

  ssl_certificate /etc/letsencrypt/live/fohstore.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/fohstore.ru/privkey.pem;

  return 301 https://xn--n1aagcfji.xn--p1ai$request_uri;
}
