server {
    listen 8089;

    location /bot {
        proxy_pass https://api.telegram.org/bot;
        proxy_ssl_server_name on;
        proxy_set_header Host api.telegram.org;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;
    }
}
